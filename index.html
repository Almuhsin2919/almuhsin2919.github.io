    <script>
        // System Dark/Light Mode Switcher Logic
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        // Check local storage or system preference for theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        themeToggle.addEventListener('click', function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        });

        // Live Clock logic
        function updateClock() {
            const clockEl = document.getElementById('systemClock');
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            clockEl.textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Count logic from LocalStorage just to display submission status
        let localHistory = JSON.parse(localStorage.getItem('presensi_history')) || [];
        const historyCount = document.getElementById('historyCount');
        
        function updateSubmissionCount() {
            historyCount.textContent = `${localHistory.length} Kiriman`;
        }
        updateSubmissionCount();

        /* --- STREAMING_CHUNK:Handling form submission and showing notifications... --- */
        const form = document.getElementById('presensiForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const toastContainer = document.getElementById('toastContainer');

        // Spawn dynamic aesthetic toast instead of browser default alert
        function spawnToast(type, title, message) {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl shadow-2xl flex items-start space-x-3 transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto max-w-sm w-full`;
            
            if (type === 'success') {
                toast.classList.add('bg-emerald-600', 'text-white');
                toast.innerHTML = `
                    <div class="bg-emerald-500 p-2 rounded-xl mt-0.5">
                        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-extrabold text-sm">${title}</h4>
                        <p class="text-xs text-emerald-100 mt-1">${message}</p>
                    </div>
                `;
            } else {
                toast.classList.add('bg-rose-600', 'text-white');
                toast.innerHTML = `
                    <div class="bg-rose-500 p-2 rounded-xl mt-0.5">
                        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-extrabold text-sm">${title}</h4>
                        <p class="text-xs text-rose-100 mt-1">${message}</p>
                    </div>
                `;
            }

            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            }, 10);

            // Auto dismiss toast after 4.5 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 4500);
        }

        // Form submission handling
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const selectedNama = document.getElementById('nama').value;
            const selectedKeterangan = document.getElementById('keterangan').value;

            // Simple validation check
            if (!selectedNama || !selectedKeterangan) {
                spawnToast('error', 'Data Belum Lengkap', 'Silakan pilih Nama dan Kategori Kehadiran terlebih dahulu.');
                return;
            }

            // Transition UI into loading state
            submitBtn.disabled = true;
            btnText.textContent = "Mengirimkan Data...";
            loadingSpinner.classList.remove('hidden');

            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSfeu7lyRQxwlEmCetAwKf4nR5jWuS7omq4AvMglOim072wFcA/formResponse";

            const formData = new FormData();
            formData.append('entry.1740789150', selectedNama);
            formData.append('entry.937883872', selectedKeterangan);

            fetch(formURL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                // Save state to increase the submission visual count
                const timeString = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                localHistory.push({ nama: selectedNama, keterangan: selectedKeterangan, timestamp: timeString });
                localStorage.setItem('presensi_history', JSON.stringify(localHistory));
                updateSubmissionCount();

                // Show gorgeous custom success notification
                spawnToast('success', 'Berhasil Terkirim!', `Kehadiran untuk "${selectedNama}" berhasil tercatat ke sistem.`);
                
                // Reset form values cleanly
                form.reset();
            }).catch(() => {
                // Show gorgeous failure notification
                spawnToast('error', 'Koneksi Gagal', 'Gagal mengirim data. Silakan periksa jaringan internet Anda.');
            }).finally(() => {
                // Restore button states
                submitBtn.disabled = false;
                btnText.textContent = "Kirim Presensi Sekarang";
                loadingSpinner.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
